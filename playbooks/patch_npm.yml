---
# Remediate a Node.js package installed globally via npm.
# Variables: pkg, npm_package (optional, defaults to pkg),
#            health_url, services_to_restart
- name: Remediate vulnerability — npm global package
  hosts: all
  become: true
  gather_facts: false
  vars:
    pkg: ""
    npm_package: ""
    health_url: "http://localhost/health"
    services_to_restart: ""

  tasks:
    - name: Resolve effective npm package name
      ansible.builtin.set_fact:
        _npm_pkg: "{{ npm_package if npm_package | length > 0 else pkg }}"

    - name: Record pre-upgrade version
      ansible.builtin.command: "npm list -g {{ _npm_pkg }} --depth=0"
      register: pre_version
      changed_when: false
      failed_when: false

    - ansible.builtin.debug:
        msg: "Pre-upgrade: {{ pre_version.stdout | default('not found') }}"

    - name: Upgrade and validate
      block:
        - name: Upgrade npm package to latest
          ansible.builtin.command: "npm install -g {{ _npm_pkg }}@latest"

        - name: Restart affected services
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
          loop: "{{ services_to_restart.split(',') | select | list }}"
          when: services_to_restart | length > 0

        - name: Smoke test — application health
          ansible.builtin.uri:
            url: "{{ health_url }}"
            status_code: 200
          register: health
          retries: 3
          delay: 5
          until: health.status == 200

        - name: Record post-upgrade version
          ansible.builtin.command: "npm list -g {{ _npm_pkg }} --depth=0"
          register: post_version
          changed_when: false
        - ansible.builtin.debug:
            msg: "Post-upgrade: {{ post_version.stdout }}"

      rescue:
        - name: Restart services after failure
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
          loop: "{{ services_to_restart.split(',') | select | list }}"
          when: services_to_restart | length > 0

        - ansible.builtin.fail:
            msg: "Smoke test failed for npm:{{ _npm_pkg }}."
