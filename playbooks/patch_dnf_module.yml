---
# RHEL 8/9 (and Oracle/Alma/Rocky Linux 8/9) AppStream module stream playbook.
#
# Handles two scenarios automatically:
#
#   SAME-STREAM update (fix is within the current enabled stream):
#     dnf module update <module>:<stream>   e.g. dnf module update nginx:1.22
#
#   CROSS-STREAM upgrade (fix requires a higher version stream):
#     dnf module switch-to <target>         e.g. dnf module switch-to nginx:1.22
#     (needed when nginx:1.14 is enabled but the CVE fix is only in nginx:1.22+)
#
# The playbook detects the currently enabled stream at runtime and picks the
# right command automatically.  module_stream must be the TARGET stream.
#
# Smoke test is server-side (no health URL required):
#   1. rpm -q <pkg>              — package is installed (rc != 0 → rollback)
#   2. systemctl is-active <svc> — every restarted service is actually up
#
# Variables:
#   pkg            — RPM package name (for version recording)
#   module_stream  — module:stream string, e.g. "nodejs:18"  (required)
#   advisory       — RHSA ID if available (optional — added as --advisory flag)
#   services_to_restart — comma-separated systemd service names

- name: Remediate RHEL AppStream module-stream package
  hosts: all
  become: true
  gather_facts: true
  vars:
    pkg: ""
    module_stream: ""
    advisory: ""
    services_to_restart: ""

  tasks:
    - name: Require module_stream
      ansible.builtin.fail:
        msg: "module_stream is required (e.g. -e module_stream=nodejs:18)"
      when: module_stream | length == 0

    - name: Require RHEL/OracleLinux/AlmaLinux/Rocky 8 or 9 for AppStream modules
      ansible.builtin.fail:
        msg: "AppStream modules require RHEL-family 8 or 9; detected {{ ansible_distribution }} {{ ansible_distribution_version }}"
      when: ansible_os_family != "RedHat" or ansible_distribution_major_version | int not in [8, 9]

    - name: Record pre-update version
      ansible.builtin.command: "rpm -q --queryformat '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n' {{ pkg }}"
      register: pre_version
      changed_when: false
      failed_when: false

    - ansible.builtin.debug:
        msg: "Pre-update: {{ pre_version.stdout | default('not installed') }}"

    - name: Update module stream and validate
      block:
        - name: Detect currently enabled stream for {{ module_stream.split(':')[0] }}
          ansible.builtin.shell: >-
            dnf module list {{ module_stream.split(':')[0] }} 2>/dev/null
            | grep '\[e\]'
            | awk '{print $1":"$2}'
            | sed 's/\[.*//g'
            | head -1
            || echo ""
          register: current_stream_check
          changed_when: false
          failed_when: false

        - ansible.builtin.debug:
            msg: >-
              Current enabled stream: '{{ current_stream_check.stdout | trim }}'
              → target stream: '{{ module_stream }}'
              → action: {{ 'switch-to' if current_stream_check.stdout | trim != module_stream else 'update' }}

        - name: Switch to target module stream {{ module_stream }} (cross-stream upgrade)
          ansible.builtin.command: "dnf module switch-to {{ module_stream }} -y"
          register: dnf_switch_result
          when: current_stream_check.stdout | trim != module_stream

        - name: Update packages within existing stream {{ module_stream }}
          ansible.builtin.command:
            cmd: >-
              dnf module update {{ module_stream }} -y
              {% if advisory | length > 0 %}--advisory {{ advisory }}{% endif %}
          register: dnf_update_result
          when: current_stream_check.stdout | trim == module_stream

        - ansible.builtin.debug:
            msg: "{{ (dnf_switch_result.stdout_lines | default([])) + (dnf_update_result.stdout_lines | default([])) }}"

        - name: Restart services listed in plan
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
          loop: "{{ services_to_restart.split(',') | select | list }}"
          when: services_to_restart | length > 0

        - name: Check for additional services needing restart
          ansible.builtin.command: "needs-restarting -s"
          register: needs_restart_out
          changed_when: false
          failed_when: false

        - name: Restart additional services identified by needs-restarting
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
          loop: "{{ needs_restart_out.stdout_lines | default([]) | select | list }}"
          when:
            - needs_restart_out.rc == 0
            - item not in (services_to_restart.split(',') | select | list)
          ignore_errors: true

        - name: Check reboot requirement
          ansible.builtin.command: "needs-restarting -r"
          register: reboot_check
          changed_when: false
          failed_when: false
        - ansible.builtin.debug:
            msg: "Reboot required: {{ reboot_check.rc == 1 }}"

        - name: Smoke test — verify package installed at new version
          ansible.builtin.command: "rpm -q --queryformat '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n' {{ pkg }}"
          register: post_version
          changed_when: false
          failed_when: post_version.rc != 0

        - ansible.builtin.debug:
            msg: >-
              Smoke test passed.
              Pre:  {{ pre_version.stdout | default('unknown') | trim }}
              Post: {{ post_version.stdout | trim }}

        - name: Smoke test — verify services are active after restart
          ansible.builtin.command: "systemctl is-active {{ item }}"
          loop: "{{ services_to_restart.split(',') | select | list }}"
          when: services_to_restart | length > 0

      rescue:
        - name: Roll back last dnf transaction
          ansible.builtin.command: "dnf -y history undo last"

        - name: Restart services after rollback
          ansible.builtin.systemd:
            name: "{{ item }}"
            state: restarted
          loop: "{{ services_to_restart.split(',') | select | list }}"
          when: services_to_restart | length > 0

        - ansible.builtin.fail:
            msg: >
              Smoke test failed for module {{ module_stream }} ({{ pkg }}).
              Rolled back automatically via 'dnf history undo last'.
